name: Create GitHub Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: create-github-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Detect release commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          SUBJECT="$(git log -1 --pretty=%s)"
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

          # Match:
          #   release: v1.2.3
          #   release: v1.2.3-alpha.0 / beta.1 / rc.0
          if [[ "$SUBJECT" =~ ^release:\ v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            if [[ "$VERSION" == *-* ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if not a release commit
        if: steps.detect.outputs.is_release != 'true'
        run: echo "Not a release commit. Skip."

      - name: Set tag name
        if: steps.detect.outputs.is_release == 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.detect.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get release notes from merged PR body
        if: steps.detect.outputs.is_release == 'true'
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const pr = prs.data?.[0];
            if (!pr) {
              core.setFailed(`No PR found associated with commit ${sha}`);
              return;
            }

            let body = (pr.body || "").trim();

            // Only keep the section after "## Release notes"
            const m = body.match(/##\s*Release notes\s*([\s\S]*)/i);
            if (m) body = m[1].trim();

            // Trim trailing spaces
            body = body.replace(/[ \t]+$/gm, "").trim();

            core.setOutput("body", body);

      - name: Check if tag already exists
        if: steps.detect.outputs.is_release == 'true'
        id: tag_exists
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.detect.outputs.is_release == 'true' && steps.tag_exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.detect.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.detect.outputs.is_prerelease == 'true' && 'false' || 'legacy' }}
