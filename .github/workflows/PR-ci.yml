name: 🔎 PR CI · Lint / Test / Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - README.md

jobs:
  pr-ci:
    name: 🧪 Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pr-ci-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: 🧱 Setup Node (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: 📦 Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: 🚨 Lint
        id: lint
        run: pnpm run lint:ci

      - name: 🧪 Test
        id: test
        run: pnpm run test

      - name: 🏗️ Build
        id: build
        run: pnpm run build

      - name: 🧾 Job Summary
        if: always()
        shell: bash
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          {
            echo "## 🧪 CI Results"
            echo ""
            echo "- 🚨 Lint: **$LINT_OUTCOME**"
            echo "- 🧪 Test: **$TEST_OUTCOME**"
            echo "- 🏗️ Build: **$BUILD_OUTCOME**"
            echo ""
            echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 💬 Upsert PR Comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const marker = "<!-- momopix-ci -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (o) => (o === "success" ? "✅" : o === "failure" ? "❌" : "⏭️");
            const lint = process.env.LINT_OUTCOME || "skipped";
            const test = process.env.TEST_OUTCOME || "skipped";
            const build = process.env.BUILD_OUTCOME || "skipped";

            const body = [
              marker,
              "### 🧪 Momopix PR CI",
              "",
              `- 🚨 Lint: ${icon(lint)} **${lint}**`,
              `- 🧪 Test: ${icon(test)} **${test}**`,
              `- 🏗️ Build: ${icon(build)} **${build}**`,
              "",
              `🔗 Run: ${runUrl}`
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
